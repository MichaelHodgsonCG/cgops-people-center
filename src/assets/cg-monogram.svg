<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 120" role="img" aria-label="CG monogram">
  <!-- Recreation of the CG box monogram (black on white, engraved drop-shadow
       serif). Replace with the official export from CG_Dashboard/src/assets —
       same filename, no code changes needed. -->
  <rect x="6" y="6" width="178" height="108" fill="#FFFFFF" stroke="#141210" stroke-width="12"/>
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-size="80" letter-spacing="3" text-anchor="middle">
    <text x="100" y="95" fill="#141210">CG</text>
    <text x="95" y="90" fill="#141210" stroke="#FFFFFF" stroke-width="3.5" paint-order="stroke">CG</text>
  </g>
</svg>
